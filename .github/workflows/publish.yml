name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release with dist assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
      - name: Publish AT Protocol record
        env:
          ATRUN_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          ATRUN_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run atrun publish \
            --dist-url "pypi:atrun@${VERSION}" \
            --post
        if: env.ATRUN_HANDLE != ''
