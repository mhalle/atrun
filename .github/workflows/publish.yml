name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release with dist assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
      - name: Publish AT Protocol record
        env:
          ATRUN_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          ATRUN_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          WHEEL=$(ls dist/*.whl)
          BASENAME=$(basename "$WHEEL")
          NAME=$(echo "$BASENAME" | cut -d- -f1)
          VERSION=$(echo "$BASENAME" | cut -d- -f2)
          # Wait for PyPI to index, then get the actual download URL
          sleep 15
          DIST_URL=$(curl -s "https://pypi.org/pypi/${NAME}/${VERSION}/json" \
            | python3 -c "import sys,json; urls=json.load(sys.stdin)['urls']; print(next(u['url'] for u in urls if u['url'].endswith('.whl')))")
          uv run atrun publish \
            --dist-file "$WHEEL" \
            --dist-url "$DIST_URL" \
            --post
        if: env.ATRUN_HANDLE != ''
